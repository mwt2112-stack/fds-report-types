<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Financial Reports - Interactive</title>
  <style>
    :root{
      --navy:#04047d;
      --sky:#c7dbf2;
      --page:#ececec;
      --ink:#1f1f1f;
      --grid:#cfcfcf;
      --border:#202020;
      --panel:#f8fbff;
      --panelBorder:#9eb8d8;
      --panelTitle:#0c3c78;
      --linkHover:#eef5ff;
      --shadow:0 16px 40px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#0a0a0a;
      color:var(--ink);
    }

    .frame{
      min-height:100vh;
      background:var(--sky);
      padding:4px;
    }

    .slide{
      min-height:calc(100vh - 8px);
      background:var(--page);
      position:relative;
      overflow:hidden;
      border:1px solid #b7cadf;
    }

    .top-band{
      background:var(--navy);
      height:138px;
      display:flex;
      align-items:center;
      padding:0 0 0 64px;
    }

    .title{
      color:#fff;
      font-size:50px;
      font-weight:300;
      letter-spacing:-0.5px;
      line-height:1;
      margin:0;
    }

    .content{
      position:relative;
      padding:35px 54px 86px;
      height:calc(100vh - 138px);
      min-height:620px;
    }

    .report-sheet{
      width:852px;
      max-width:calc(100% - 320px);
      margin:0 auto;
      background:#f6f6f6;
      border:3px solid var(--border);
      box-shadow:0 1px 0 rgba(0,0,0,.06);
      position:relative;
    }

    .grid{
      display:grid;
      grid-template-columns:74px 284px 72px 420px;
      align-items:stretch;
      font-size:12px;
      line-height:1.15;
      background:
        linear-gradient(to right,
          transparent 0,
          transparent 74px,
          var(--grid) 74px,
          var(--grid) 76px,
          transparent 76px,
          transparent 358px,
          var(--grid) 358px,
          var(--grid) 360px,
          transparent 360px,
          transparent 432px,
          var(--grid) 432px,
          var(--grid) 434px,
          transparent 434px);
    }

    .row{ display:contents; }

    .cell{
      min-height:23px;
      border-top:1px solid var(--grid);
      padding:2px 6px;
      display:flex;
      align-items:center;
      background:transparent;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .section{
      font-style:italic;
      font-weight:700;
      text-decoration:underline;
      background:#f6f6f6;
      white-space:nowrap;
      line-height:1.1;
      font-size:11px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .section-span{
      grid-column:span 2;
      padding-right:10px;
    }

    .source{
      color:#3d3d3d;
      justify-content:flex-start;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .report-btn{
      appearance:none;
      border:0;
      background:transparent;
      padding:0;
      margin:0;
      font:inherit;
      color:inherit;
      text-align:left;
      width:100%;
      cursor:pointer;
      display:block;
      line-height:1.15;
    }

    .cell.clickable{
      cursor:pointer;
      transition:background .15s ease, box-shadow .15s ease, transform .15s ease;
      position:relative;
    }

    .cell.clickable:hover{
      background:var(--linkHover);
    }

    .cell.clickable.active{
      background:#dfeeff;
      box-shadow:inset 0 0 0 1px #7ca5d4;
    }

    .cell.clickable.active::after{
      content:"";
      position:absolute;
      inset:1px;
      border:1px solid rgba(12,60,120,.22);
      pointer-events:none;
    }

    .footer-brand{
      position:absolute;
      left:48px;
      bottom:16px;
      color:#8b8b8b;
      font-family: Georgia, 'Times New Roman', serif;
      display:flex;
      align-items:flex-start;
      gap:8px;
      user-select:none;
    }

    .footer-brand .crown{
      color:#5d84bf;
      font-size:24px;
      line-height:1;
      transform:translateY(-1px);
    }

    .footer-brand .brand-text{
      line-height:1;
    }

    .footer-brand .brand-main{
      font-size:22px;
      letter-spacing:.2px;
    }

    .footer-brand .brand-sub{
      font-size:12px;
      font-weight:700;
      letter-spacing:.7px;
      margin-top:4px;
    }

    .panel{
      position:absolute;
      top:24px;
      right:28px;
      width:290px;
      max-height:calc(100% - 54px);
      background:var(--panel);
      border:1px solid var(--panelBorder);
      box-shadow:var(--shadow);
      border-radius:16px;
      overflow:hidden;
      transform:translateX(115%);
      opacity:0;
      pointer-events:none;
      transition:transform .28s ease, opacity .28s ease;
    }

    .panel.open{
      transform:translateX(0);
      opacity:1;
      pointer-events:auto;
    }

    .panel-header{
      background:linear-gradient(180deg,#eef5ff 0%, #e4efff 100%);
      padding:16px 18px 14px;
      border-bottom:1px solid #c7daef;
      position:relative;
    }

    .panel-kicker{
      font-size:11px;
      font-weight:700;
      letter-spacing:.8px;
      text-transform:uppercase;
      color:#5f7fa6;
      margin-bottom:8px;
    }

    .panel-title{
      margin:0;
      font-size:23px;
      line-height:1.08;
      color:var(--panelTitle);
    }

    .panel-close{
      position:absolute;
      top:10px;
      right:10px;
      width:32px;
      height:32px;
      border-radius:999px;
      border:1px solid #bcd0e9;
      background:#fff;
      font-size:18px;
      cursor:pointer;
    }

    .panel-body{
      padding:16px 18px 18px;
      overflow:auto;
      max-height:calc(100vh - 280px);
    }

    .detail-block + .detail-block{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid #dce7f3;
    }

    .detail-label{
      font-size:11px;
      font-weight:700;
      letter-spacing:.8px;
      text-transform:uppercase;
      color:#5b7597;
      margin-bottom:6px;
    }

    .detail-text{
      margin:0;
      font-size:14px;
      line-height:1.45;
      color:#1d2b3a;
    }

    .empty-note{
      color:#6c7b8b;
      font-style:italic;
    }

    @media (max-width: 1200px){
      .content{padding-right:340px}
      .report-sheet{max-width:100%; margin-left:0}
    }

    @media (max-width: 980px){
      .title{font-size:40px}
      .content{padding:28px 24px 120px; height:auto; min-height:unset}
      .report-sheet{max-width:100%; width:100%; overflow:auto}
      .panel{
        position:fixed;
        right:14px;
        top:14px;
        bottom:14px;
        width:min(360px, calc(100vw - 28px));
        max-height:none;
      }
      .panel-body{max-height:calc(100vh - 120px)}
      .grid{min-width:854px}
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="slide">
      <div class="top-band">
        <h1 class="title">Available Financial Reports</h1>
      </div>

      <div class="content">
        <div class="report-sheet">
          <div class="grid" id="reportGrid"></div>
        </div>

        <aside class="panel" id="detailPanel" aria-hidden="true">
          <div class="panel-header">
            <div class="panel-kicker" id="panelCategory">Report Details</div>
            <h2 class="panel-title" id="panelTitle">Select a report</h2>
            <button class="panel-close" id="panelClose" aria-label="Close details">×</button>
          </div>
          <div class="panel-body" id="panelBody">
            <p class="detail-text empty-note">Click any report name in the table to see a fuller explanation.</p>
          </div>
        </aside>

        <div class="footer-brand" aria-hidden="true">
          <div class="crown">♔</div>
          <div class="brand-text">
            <div class="brand-main">Columbia University</div>
            <div class="brand-sub">IN THE CITY OF NEW YORK</div>
          </div>
        </div>
      </div>
    </div>
  </div>

    const leftRows = [
      ["section","Trial Balance"],
      ["report","ARC","Trial Balance by Business Unit(s)"],
      ["report","ARC","Trial Balance by Funds"],
      ["report","FDS","Trial Balance by Department(s)"],
      ["report","FDS","Trial Balance by ChartField"],
      ["report","FDS","Trial Balance by Account Detail"],
      ["blank"],
      ["section","Chartfield Statement"],
      ["report","FDS","Department Summary Statement"],
      ["report","FDS","Project Summary Statement"],
      ["report","FDS","Initiative Summary Statement"],
      ["report","FDS","Segment Summary Statement"],
      ["report","FDS","Site Summary Statement"],
      ["report","FDS","Chartfield Detail Statement"],
      ["report","FDS","Chartfield Transaction Statement"],
      ["blank"],
      ["section","Financial Statements"],
      ["report","ARC","Balance Sheet - Consolidated"],
      ["report","ARC","Statement of Activities - Consolidated"],
      ["report","FDS","Balance Sheet - Departmental"],
      ["report","FDS","Statement of Activities - Departmental"],
      ["blank"],
      ["section","Endowment Reports"],
      ["report","FDS","Endowment Market Value Report"],
      ["report","FDS","Endowment Spending Report"],
      ["blank"],
      ["blank"],
      ["blank"]
    ];

    const rightRows = [
      ["section","Consolidated Operating Reports (COB)"],
      ["report","FDS","COB Detail Operating Statement"],
      ["report","FDS","COB Summary Operating Statement"],
      ["report","FDS","COB Operating Statement by Fund"],
      ["report","FDS","COB Current Estimate Review with Extrapolation"],
      ["report","FDS","COB Expense Summary by Function"],
      ["report","FDS","COB Budget Comparison"],
      ["report","FDS","Budget Changes"],
      ["report","FDS","Internal Transfers"],
      ["report","FDS","Change in Fund Balance"],
      ["blank"],
      ["section","Project Lifecycle Reports"],
      ["report","ARC","Project Information Notification (PIN)"],
      ["report","FDS","Sponsored Project Financial Report"],
      ["report","FDS","Non-Sponsored Project Financial Report"],
      ["report","FDS","F&A Recovery Report"],
      ["report","FDS","Project Cost Overrun"],
      ["blank"],
      ["section","Payroll Reports"],
      ["report","FDS","Payroll Summary Report"],
      ["report","FDS","Payroll Detail Report"],
      ["report","FDS","EE by Chartstring Report"],
      ["report","FDS","Department Employee Report"],
      ["blank"],
      ["section","Other Reports"],
      ["report","FDS","Fringe Benefit Report"],
      ["report","FDS","Departmental Claim on Cash"],
      ["report","FDS","Fund Balance/Overdraft"]
    ];

    const grid = document.getElementById('reportGrid');
    const panel = document.getElementById('detailPanel');
    const panelCategory = document.getElementById('panelCategory');
    const panelTitle = document.getElementById('panelTitle');
    const panelBody = document.getElementById('panelBody');
    const panelClose = document.getElementById('panelClose');

    let activeName = null;

    function cell(text = '', className = '', htmlTag = 'div') {
      const el = document.createElement(htmlTag);
      el.className = `cell ${className}`.trim();
      el.textContent = text;
      return el;
    }

    function renderGrid(){
      const rowCount = Math.max(leftRows.length, rightRows.length);
      for(let i = 0; i < rowCount; i++){
        const left = leftRows[i] || ["blank"];
        const right = rightRows[i] || ["blank"];

        renderHalf(left, 'left');
        renderHalf(right, 'right');
      }
    }

    function renderHalf(item){
      const type = item[0];

      if(type === 'section'){
        grid.appendChild(cell(item[1], 'section section-span'));
        return;
      }

      if(type === 'report'){
        const source = cell(item[1], 'source');
        const reportCell = cell('', 'clickable');
        const btn = document.createElement('button');
        btn.className = 'report-btn';
        btn.textContent = item[2];
        btn.dataset.report = item[2];
        btn.addEventListener('click', () => toggleReport(item[2], reportCell));
        reportCell.appendChild(btn);
        grid.appendChild(source);
        grid.appendChild(reportCell);
        return;
      }

      grid.appendChild(cell(''));
      grid.appendChild(cell(''));
    }

    function toggleReport(name, clickedCell){
      const currentlyActive = activeName === name;
      clearActive();

      if(currentlyActive){
        closePanel();
        activeName = null;
        return;
      }

      activeName = name;
      clickedCell.classList.add('active');
      openPanel(name);
    }

    function clearActive(){
      document.querySelectorAll('.cell.clickable.active').forEach(el => el.classList.remove('active'));
    }

    function openPanel(name){
      const detail = reportDetails[name] || {
        category: 'Report Details',
        description: 'A fuller description has not been added yet for this report.',
        use: 'Use this report when you need more targeted visibility into a specific financial question.',
        focus: 'Update this section with local guidance, common filters, and interpretation notes.'
      };

      panelCategory.textContent = detail.category;
      panelTitle.textContent = name;
      panelBody.innerHTML = `
        <div class="detail-block">
          <div class="detail-label">What it is</div>
          <p class="detail-text">${detail.description}</p>
        </div>
        <div class="detail-block">
          <div class="detail-label">When to use it</div>
          <p class="detail-text">${detail.use}</p>
        </div>
        <div class="detail-block">
          <div class="detail-label">Why it matters</div>
          <p class="detail-text">${detail.focus}</p>
        </div>
      `;
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
    }

    function closePanel(){
      panel.classList.remove('open');
      panel.setAttribute('aria-hidden', 'true');
    }

    panelClose.addEventListener('click', () => {
      clearActive();
      activeName = null;
      closePanel();
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape'){
        clearActive();
        activeName = null;
        closePanel();
      }
    });

    renderGrid();
  </script>
</body>
</html>
